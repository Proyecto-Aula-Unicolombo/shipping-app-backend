version: "3.8"

services:
  db:
    image: postgis/postgis:16-3.4-alpine
    ports: 
      - "5433:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 20s
      timeout: 15s
      retries: 5
    networks:
      - app-network
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./internal/app/infrastructure/database/sql/init:/docker-entrypoint-initdb.d:ro
  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    healthcheck:
      test: rabbitmq-diagnostics ping
      interval: 30s
      timeout: 20s
      retries: 5
    networks:
      - rabbit-network

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025" 
    networks:
      - mail-network
  app:
    build: .
    ports:
      - "8000:8080"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      RABBITMQ_URL: ${RABBITMQ_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_FROM: ${SMTP_FROM}
      COORDINATOR_EMAIL: ${COORDINATOR_EMAIL}
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - app-network
      - rabbit-network
      - mail-network

  
networks:
  app-network:
    driver: bridge
  rabbit-network:
    driver: bridge
  mail-network:
    driver: bridge

volumes:
  db_data:
